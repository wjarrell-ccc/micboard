# Micboard nginx configuration for multivenue setup
# Place this content in /etc/nginx/nginx.conf
# Replace YOUR_USERNAME with your actual username
# Add upstream and location blocks for each venue following the pattern below

user YOUR_USERNAME;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Add one upstream block per venue
    upstream micboard_venue_a {
        server localhost:8080;
    }
    upstream micboard_venue_b {
        server localhost:8081;
    }

    server {
        listen 80;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        sendfile on;
        sendfile_max_chunk 512k;

        # Serves splash page static assets
        location /static/ {
            alias "/home/YOUR_USERNAME/micboard/static/";
        }

        # venue-a - repeat this block for each venue
        location /venue-a/static/ {
            alias "/home/YOUR_USERNAME/micboard/static/";
        }
        location /venue-a/bg/ {
            alias "/home/YOUR_USERNAME/.local/share/micboard/venue-a/backgrounds/";
        }
        location /venue-a/ {
            proxy_pass http://micboard_venue_a;
            rewrite /venue-a/(.*) /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # venue-b - repeat this block for each venue
        location /venue-b/static/ {
            alias "/home/YOUR_USERNAME/micboard/static/";
        }
        location /venue-b/bg/ {
            alias "/home/YOUR_USERNAME/.local/share/micboard/venue-b/backgrounds/";
        }
        location /venue-b/ {
            proxy_pass http://micboard_venue_b;
            rewrite /venue-b/(.*) /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Serves multivenue splash page at root
        location / {
            root "/home/YOUR_USERNAME/micboard/static/";
            index multivenue.html;
        }
    }
}
